<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Manage Your Tasks Efficiently</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>📋 Task Manager</h1>
                <p class="subtitle">Keep track of your daily tasks</p>
            </div>
        </header>

        <main class="main">
            <!-- Add Task Section -->
            <section class="add-task-section">
                <h2>Add a New Task</h2>
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="taskTitle" 
                            placeholder="What needs to be done?" 
                            required
                            class="input-title"
                        >
                    </div>
                    <div class="form-group">
                        <textarea 
                            id="taskDescription" 
                            placeholder="Add a description (optional)" 
                            rows="3"
                            class="input-description"
                        ></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>
            </section>

            <!-- Filters Section -->
            <section class="filters-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="filter-actions">
                    <span class="task-count" id="taskCount">0 tasks</span>
                    <button class="btn btn-danger btn-small" id="clearCompletedBtn" style="display: none;">Clear Completed</button>
                </div>
            </section>

            <!-- Tasks List -->
            <section class="tasks-section">
                <div id="tasksList" class="tasks-list">
                    <div class="empty-state">
                        <p>No tasks yet. Create one to get started!</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Task Manager v1.0 | Build your productivity</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
